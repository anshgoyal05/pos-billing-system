<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 id="mainheading">Retail Billing System</h1>
    <div class="container">
        <div class="card">
            <h2>Add to Cart</h2>
            <div class="product-group">
                <div>
                    <label for="product-filter">Product</label>
                    <input type="text" id="product-filter" name="product-filter" placeholder="Enter Product id..."
                        required />
                </div>
                <div>
                    <label for="product-price">Product Price</label>
                    <input type="number" id="product-price" name="product-price" placeholder="Enter product price..." />
                </div>
                <div>
                    <label for="product-qty">Product Quantity</label>
                    <input type="number" id="product-qty" name="product-qty" placeholder="Enter product quantity..." />
                </div>
                <div>
                    <button type="submit" id="add-to-cart">Add to Cart</button>
                </div>
            </div>
        </div>
        <h2>Cart Items</h2>
        <div class="cart-items">
            <table>
                <thead>
                    <tr>
                        <th>Product Description</th>
                        <th>Price</th>
                        <th>Quantity</th>
                    </tr>
                </thead>
                <tbody id="cart-items-body"></tbody>
            </table>
        </div>
    </div>

    <script src="index.js"></script>
</body>

</html>
